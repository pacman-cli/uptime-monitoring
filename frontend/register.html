<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>UptimeMonitor — Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="stylesheet" href="styles.css?v=3">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#10b981',
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans antialiased overflow-hidden relative"
    style="touch-action: manipulation;">

    <!-- Decorative background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand opacity-20 rounded-full blur-3xl animate-pulse" aria-hidden="true"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 opacity-20 rounded-full blur-3xl animate-pulse"
        style="animation-delay: 2s;" aria-hidden="true"></div>

    <div
        class="fade-in-up bg-slate-800/80 backdrop-blur-xl p-8 rounded-2xl shadow-2xl border border-slate-700/50 w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block" aria-label="UptimeMonitor Home">
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand to-blue-500">Create
                    Account</h1>
            </a>
            <p class="text-sm text-slate-400 mt-2">Start monitoring your endpoints for free</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div id="regErrorBox" aria-live="polite"
                class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-sm p-3 rounded-lg text-center">
            </div>

            <div>
                <label for="regEmail" class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                <input type="email" id="regEmail" required autocomplete="email" spellcheck="false"
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition duration-200 placeholder-slate-500"
                    placeholder="admin@example.com…">
            </div>

            <div>
                <label for="regPassword" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" id="regPassword" required minlength="8" autocomplete="new-password"
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition duration-200 placeholder-slate-500"
                    placeholder="••••••••…">
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-brand to-emerald-600 hover:from-emerald-500 hover:to-emerald-400 text-white font-semibold py-3 px-4 rounded-lg transform transition-all duration-200 hover:scale-[1.02] shadow-lg shadow-brand/25 flex justify-center items-center">
                <span id="regBtnText">Register</span>
                <span id="regLoader"
                    class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" aria-hidden="true"></span>
            </button>

            <p class="text-center text-xs text-slate-500">Already have an account? <a href="login.html"
                    class="text-brand hover:underline font-medium">Sign in</a></p>
        </form>
    </div>

    <script src="app.js?v=3"></script>
    <script>
        if (localStorage.getItem('uptime_jwt')) {
            window.location.href = 'dashboard.html'
        }
    </script>
</body>

</html>
