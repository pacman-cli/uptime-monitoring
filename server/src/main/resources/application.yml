spring:
  application:
    name: uptime
  datasource:
    url: jdbc:postgresql://localhost:5433/uptime_monitor
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: smtp.gmail.com
    port: 587
    username: puspo@gmail.com
    password: puspo123
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

uptime:
  scheduler:
    poll-interval-ms: 30000
  app:
    base-url: http://localhost:8080
  alert:
    email:
      enabled: true
      from: puspo@gmail.com
